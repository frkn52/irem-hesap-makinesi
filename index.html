<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Irem'in Hesap Makinesi</title>
  <style>
    :root {
      --bg1: #ff9ecb;
      --bg2: #ffd6ec;
      --btn: #ff5ca8;
      --btn-dark: #e14791;
      --white: #ffffff;
      --text-main: #4a1730;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(-45deg, #ff9ecb, #ffd6ec, #ffc3e0, #ffe4f3);
      background-size: 400% 400%;
      animation: gradientMove 8s ease infinite;
      color: var(--text-main);
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .calculator {
      width: min(92vw, 360px);
      padding: 20px;
      border-radius: 30px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.38), rgba(255, 255, 255, 0.16));
      border: 1px solid rgba(255, 255, 255, 0.45);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      box-shadow:
        0 20px 50px rgba(0, 0, 0, 0.15),
        inset 0 1px 0 rgba(255, 255, 255, 0.45),
        inset 0 -1px 0 rgba(255, 255, 255, 0.18);
    }

    .title {
      text-align: center;
      font-weight: 700;
      margin-bottom: 15px;
      color: #4a1730;
    }

    .display {
      width: 100%;
      height: 80px;
      border: 1px solid rgba(255, 255, 255, 0.65);
      border-radius: 20px;
      padding: 15px;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.95), rgba(255, 240, 247, 0.72));
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: var(--text-main);
      font-size: 2rem;
      text-align: right;
      box-shadow:
        0 0 15px rgba(255, 92, 168, 0.25),
        inset 0 1px 0 rgba(255, 255, 255, 0.7);
      margin-bottom: 15px;
    }

    .keys {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      border: 1px solid rgba(255, 255, 255, 0.38);
      border-radius: 18px;
      height: 60px;
      font-size: 1.2rem;
      font-weight: bold;
      cursor: pointer;
      color: var(--text-main);
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.42), rgba(255, 255, 255, 0.2));
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      box-shadow:
        0 10px 20px rgba(164, 61, 114, 0.12),
        inset 0 1px 0 rgba(255, 255, 255, 0.5);
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.05);
    }

    button:active {
      transform: scale(0.92);
      box-shadow: inset 0 5px 10px rgba(0, 0, 0, 0.2);
    }

    .operator,
    .equals {
      background: linear-gradient(135deg, rgba(255, 92, 168, 0.92), rgba(225, 71, 145, 0.86));
      border: 1px solid rgba(255, 255, 255, 0.25);
      color: #fff;
    }

    .operator:hover,
    .equals:hover {
      background: var(--btn-dark);
    }

    .span-2 {
      grid-column: span 2;
    }
  </style>
</head>
<body>
  <main class="calculator">
    <h1 class="title">Irem'in Hesap Makinesi</h1>
    <input id="display" class="display" type="text" value="0" readonly>

    <section class="keys" aria-label="Hesap makinesi tuslari">
      <button type="button" data-action="clear" class="span-2">AC</button>
      <button type="button" data-action="delete">DEL</button>
      <button type="button" data-value="/" class="operator">/</button>

      <button type="button" data-value="7">7</button>
      <button type="button" data-value="8">8</button>
      <button type="button" data-value="9">9</button>
      <button type="button" data-value="*" class="operator">*</button>

      <button type="button" data-value="4">4</button>
      <button type="button" data-value="5">5</button>
      <button type="button" data-value="6">6</button>
      <button type="button" data-value="-" class="operator">-</button>

      <button type="button" data-value="1">1</button>
      <button type="button" data-value="2">2</button>
      <button type="button" data-value="3">3</button>
      <button type="button" data-value="+" class="operator">+</button>

      <button type="button" data-value="0" class="span-2">0</button>
      <button type="button" data-value=".">.</button>
      <button type="button" data-action="equals" class="equals">=</button>
    </section>
  </main>

  <script>
    const display = document.getElementById("display");
    const buttons = document.querySelector(".keys");

    function updateDisplay(value) {
      display.value = value || "0";
    }

    function appendValue(value) {
      const current = display.value;
      if (current === "0" && value !== ".") {
        updateDisplay(value);
        return;
      }

      updateDisplay(current + value);
    }

    function calculate() {
      try {
        const result = Function('"use strict"; return (' + display.value + ")")();
        updateDisplay(String(result));
      } catch {
        updateDisplay("Hata");
      }
    }

    buttons.addEventListener("click", (event) => {
      const target = event.target;
      if (!(target instanceof HTMLButtonElement)) {
        return;
      }

      const { value, action } = target.dataset;

      if (action === "clear") {
        updateDisplay("0");
        return;
      }

      if (action === "delete") {
        updateDisplay(display.value.slice(0, -1));
        return;
      }

      if (action === "equals") {
        calculate();
        return;
      }

      if (value) {
        if (display.value === "Hata") {
          updateDisplay(value);
          return;
        }
        appendValue(value);
      }
    });
  </script>
</body>
</html>
